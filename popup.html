<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AI Autofill</title>
  <style>
    :root {
      --ink: #11243f;
      --ink-soft: #5b6f8f;
      --primary: #0d63f3;
      --primary-dark: #094cb8;
      --line: #d4e0f4;
      --danger: #b1374a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Manrope", "Segoe UI", sans-serif;
      margin: 0;
      padding: 14px;
      width: 390px;
      color: var(--ink);
      background:
        radial-gradient(420px 220px at 85% -10%, #cfe0ff 0%, transparent 55%),
        linear-gradient(180deg, #eff5ff 0%, #dce9ff 100%);
    }
    .shell {
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 18px 40px rgba(19, 48, 97, 0.18);
      backdrop-filter: blur(10px);
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 11px;
      color: #5d76a0;
      margin: 0 0 8px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 10px 10px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      border: 1px solid #d5e3fb;
      color: #173056;
      font-weight: 800;
    }
    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      box-shadow: 0 8px 16px rgba(13, 99, 243, 0.18);
    }
    h3 { margin: 0; color: #173056; font-size: 24px; letter-spacing: -0.03em; }
    .lead { margin: 8px 0 16px; color: var(--ink-soft); font-size: 13px; line-height: 1.5; }
    .hero-pills { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 16px; }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef4ff;
      border: 1px solid #d4e3ff;
      color: #23446e;
      font-size: 11px;
      font-weight: 700;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      box-shadow: 0 10px 22px rgba(19, 48, 97, 0.08);
    }
    .panel + .panel { margin-top: 12px; }
    label { display: block; margin-top: 10px; font-size: 12px; font-weight: 700; color: #325072; }
    input, select, button, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid #bfd0e8;
      font: inherit;
    }
    input, select {
      background: rgba(255,255,255,.95);
      color: var(--ink);
    }
    button {
      border: 0;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary) 0%, #2b84ff 100%);
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(13, 99, 243, 0.2);
    }
    button:hover { background: linear-gradient(135deg, var(--primary-dark) 0%, #1d6fe3 100%); }
    button.ghost {
      background: linear-gradient(180deg, #eef4ff 0%, #e0ebff 100%);
      color: #1c3d71;
      margin-top: 6px;
      box-shadow: none;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .meta {
      font-size: 12px;
      margin-top: 12px;
      color: #2d7a45;
      padding: 12px;
      border-radius: 14px;
      background: #eefcf2;
      border: 1px solid #c8e8d0;
      min-height: 44px;
    }
    .small {
      font-size: 11px;
      color: #556884;
      margin-top: 10px;
      white-space: pre-wrap;
      max-height: 160px;
      overflow: auto;
      padding: 12px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid var(--line);
      line-height: 1.5;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 12px;
      color: #364f73;
      font-weight: 600;
    }
    .check input { width: auto; margin: 0; }
  </style>
</head>
<body>
  <div class="shell">
    <p class="eyebrow">Browser Extension</p>
    <div class="brand">
      <img src="logo.png" alt="Universal Autofill logo" />
      <span>Universal Autofill</span>
    </div>
    <h3>Universal Autofill</h3>
    <p class="lead">Connect your dashboard profile, preview matches, then apply autofill on the current page.</p>
    <div class="hero-pills">
      <span class="pill">Preview first</span>
      <span class="pill">Per-profile</span>
      <span class="pill">AI matching</span>
    </div>

    <div class="panel">
      <label>JWT Token</label>
      <input id="token" placeholder="Paste token from dashboard" />

      <label>Profile</label>
      <select id="profileSelect"></select>

      <label class="check">
        <input type="checkbox" id="includeSensitive" />
        Include sensitive fields
      </label>

      <button id="save">Save Settings</button>
    </div>

    <div class="panel">
      <div class="row">
        <button class="ghost" id="preview">Preview Matches</button>
        <button id="autofill">Apply Autofill</button>
      </div>

      <div id="status" class="meta">Ready.</div>
      <div id="details" class="small"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
